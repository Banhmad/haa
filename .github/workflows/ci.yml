name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict default permissions for all jobs; individual jobs can escalate
# only what they need (e.g. upload-artifact needs no extra permissions).
permissions:
  contents: read

env:
  NODE_VERSION: '18'

jobs:
  # ── Client: lint & test ───────────────────────────────────────────────────────
  lint-and-test-client:
    name: Client – Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

  # ── Server: lint & test ───────────────────────────────────────────────────────
  lint-and-test-server:
    name: Server – Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          PORT: 5001
          MONGODB_URI: mongodb://localhost:27017/haa_test
          JWT_SECRET: ci_test_secret_not_for_production
          JWT_EXPIRES_IN: 7d
          ALPHA_VANTAGE_API_KEY: demo
          FINNHUB_API_KEY: demo

  # ── Client: build ─────────────────────────────────────────────────────────────
  build-client:
    name: Client – Build
    runs-on: ubuntu-latest
    needs: lint-and-test-client
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:5000/api
          REACT_APP_ENV: production
          REACT_APP_APP_NAME: منصة HAA للتحليل المالي

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build
          retention-days: 7

  # ── Server: build ─────────────────────────────────────────────────────────────
  build-server:
    name: Server – Build
    runs-on: ubuntu-latest
    needs: lint-and-test-server
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/dist
          retention-days: 7
